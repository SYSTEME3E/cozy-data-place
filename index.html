<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>NEXORA</title>
    <meta name="description" content="Nexora — Plateforme de cartes virtuelles et services financiers." />
    <meta name="author" content="Nexora" />

    <!-- ── PWA ──────────────────────────────────────────────── -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0a0e27" />

    <!-- Android -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Nexora" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/icons/icon-96.png" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="NEXORA" />
    <meta property="og:description" content="Plateforme de cartes virtuelles et services financiers." />
    <meta property="og:image"       content="/icons/icon-512.png" />
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="NEXORA" />
    <meta name="twitter:description" content="Plateforme de cartes virtuelles et services financiers." />
    <meta name="twitter:image"       content="/icons/icon-512.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- ── Enregistrement du Service Worker ─────────────────── -->
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("/sw.js", { scope: "/" })
            .then((reg) => {
              console.log("[Nexora SW] Enregistré avec succès. Scope :", reg.scope);

              // Vérifier les mises à jour du SW toutes les 60 secondes
              setInterval(() => reg.update(), 60_000);
            })
            .catch((err) => {
              console.error("[Nexora SW] Erreur d'enregistrement :", err);
            });
        });
      }
    </script>
  </body>
</html>
